services:
  rag-api:
    build: .
    image: rag-ensemble-api
    ports:
      - "8002:8000"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - LLM_BASE_URL=${LLM_BASE_URL:-}
      - LLM_MODEL=${LLM_MODEL:-}
      - LLM_API_KEY=${LLM_API_KEY:-}
    volumes:
      - huggingface_cache:/root/.cache/huggingface
    restart: unless-stopped

  rag-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: rag-ensemble-ui
    ports:
      - "8501:8501"
    environment:
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app
      - RAG_API_URL=http://rag-api:8000
    command: streamlit run src/ui/rag_ui.py --server.port 8501 --server.address 0.0.0.0
    depends_on:
      - rag-api
    restart: unless-stopped

volumes:
  huggingface_cache:
